services:
  - type: web
    name: drishti-scan-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PIP_EXTRA_INDEX_URL
        value: https://download.pytorch.org/whl/cpu
      - key: DATABASE_URL
        fromDatabase:
          name: drishti-scan-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_CREDENTIALS
        value: "false"
      - key: FERNET_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: openrouter/auto
      - key: LLM_TIMEOUT_SECONDS
        value: "120"
      - key: LLM_TEMPERATURE
        value: "0"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        value: DristiScan
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: deepseek-coder
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "120"
      - key: RAG_DEBUG
        value: "false"
      - key: PREWARM_EMBEDDINGS_ON_STARTUP
        value: "true"
      - key: HF_HOME
        value: /opt/render/.cache/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/.cache/huggingface
      - key: AI_INJECTION_ENABLED
        value: "false"
      - key: AI_SECRETS_ENABLED
        value: "false"
      - key: AI_AUTH_ENABLED
        value: "false"
      - key: AI_DEPENDENCY_ENABLED
        value: "false"
      - key: AI_PLANNER_ENABLED
        value: "false"
      - key: AI_REPORT_ENABLED
        value: "true"
      - key: RAG_TOP_K
        value: "5"

databases:
  - name: drishti-scan-db
    plan: free
    region: oregon
    databaseName: drishtiscan
