version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: drishti_scan_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: drishtiscan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: drishti_scan_backend
    ports:
      - "8000:8000"
    environment:
      # Use the container port (5432) for internal connectivity; host maps 5433:5432
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/drishtiscan
      - SECRET_KEY=supersecretkey_change_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-deepseek-coder}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-120}
      - FERNET_KEY=${FERNET_KEY}
      - RAG_DEBUG=${RAG_DEBUG:-false}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_MODEL=${LLM_MODEL:-openrouter/auto}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:5173}
      - OPENROUTER_SITE_NAME=${OPENROUTER_SITE_NAME:-DristiScan}
      # Model cache — must match the volume mount path so downloads persist
      - HF_HOME=/root/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/root/.cache/huggingface/sentence_transformers
      - PREWARM_EMBEDDINGS_ON_STARTUP=true
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: drishti_scan_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  huggingface_cache:
